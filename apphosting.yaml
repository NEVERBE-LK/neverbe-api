# Settings for Backend (on Cloud Run)
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 4
  memoryMiB: 8192

# Public Environment Variables — only what is actually referenced in src/
env:
  - variable: NEXT_PUBLIC_BASE_URL
    value: "https://www.neverbe.lk"
  - variable: NEXT_PUBLIC_API_URL
    value: "https://api.neverbe.lk"
  - variable: NEXT_PUBLIC_ALGOLIA_APP_ID
    value: "T4W2OD5EXU"
  - variable: NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY
    value: "a511b0ae44b3411786428006f0eab919"
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCj9w9EnT4mYFZUekJ7RUYsV3I5Zy976UE"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:953976115315:web:dda163f06336ee6972da06"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "app.neverbe.lk"
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-18EPPC075N"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "953976115315"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "neverbe-18307"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "neverbe-18307.appspot.com"

# Secrets — pulled from Google Cloud Secret Manager at RUNTIME only
secrets:
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability: ["RUNTIME"]
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability: ["RUNTIME"]
  - variable: TEXT_API_KEY
    secret: TEXT_API_KEY
    availability: ["RUNTIME"]
  - variable: HASH_SECRET
    secret: HASH_SECRET
    availability: ["RUNTIME"]
  - variable: KOKO_MERCHANT_ID
    secret: KOKO_MERCHANT_ID
    availability: ["RUNTIME"]
  - variable: KOKO_API_KEY
    secret: KOKO_API_KEY
    availability: ["RUNTIME"]
  - variable: KOKO_PRIVATE_KEY
    secret: KOKO_PRIVATE_KEY
    availability: ["RUNTIME"]
  - variable: KOKO_PUBLIC_KEY
    secret: KOKO_PUBLIC_KEY
    availability: ["RUNTIME"]
  - variable: RECAPTCHA_SECRET_KEY
    secret: RECAPTCHA_SECRET_KEY
    availability: ["RUNTIME"]
  - variable: PAYHERE_MERCHANT_SECRET
    secret: PAYHERE_MERCHANT_SECRET
    availability: ["RUNTIME"]
  - variable: PAYHERE_MERCHANT_ID
    secret: PAYHERE_MERCHANT_ID
    availability: ["RUNTIME"]
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability: ["RUNTIME"]
