# Settings for Backend (on Cloud Run)
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 4
  memoryMiB: 8192

# Server-side Environment Variables and Secrets
env:
  - variable: WEB_BASE_URL
    value: "https://www.neverbe.lk"
  - variable: API_URL
    value: "https://api.neverbe.lk"
  - variable: POS_BASE_URL
    value: "https://pos.neverbe.lk"
  - variable: ERP_BASE_URL
    value: "https://erp.neverbe.lk"
  - variable: ALGOLIA_APP_ID
    value: "T4W2OD5EXU"
  - variable: ALGOLIA_SEARCH_API_KEY
    value: "a511b0ae44b3411786428006f0eab919"
  - variable: FIREBASE_PROJECT_ID
    value: "neverbe-18307"
  - variable: FIREBASE_STORAGE_BUCKET
    value: "neverbe-18307.appspot.com"

  # Secrets — pulled from Google Cloud Secret Manager at RUNTIME only
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability: ["RUNTIME"]
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability: ["RUNTIME"]
  - variable: TEXT_API_KEY
    secret: TEXT_API_KEY
    availability: ["RUNTIME"]
  - variable: HASH_SECRET
    secret: HASH_SECRET
    availability: ["RUNTIME"]
  - variable: KOKO_MERCHANT_ID
    secret: KOKO_MERCHANT_ID
    availability: ["RUNTIME"]
  - variable: KOKO_API_KEY
    secret: KOKO_API_KEY
    availability: ["RUNTIME"]
  - variable: KOKO_PRIVATE_KEY
    secret: KOKO_PRIVATE_KEY
    availability: ["RUNTIME"]
  - variable: KOKO_PUBLIC_KEY
    secret: KOKO_PUBLIC_KEY
    availability: ["RUNTIME"]
  - variable: RECAPTCHA_SECRET_KEY
    secret: RECAPTCHA_SECRET_KEY
    availability: ["RUNTIME"]
  - variable: PAYHERE_MERCHANT_SECRET
    secret: PAYHERE_MERCHANT_SECRET
    availability: ["RUNTIME"]
  - variable: PAYHERE_MERCHANT_ID
    secret: PAYHERE_MERCHANT_ID
    availability: ["RUNTIME"]
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability: ["RUNTIME"]
